name: Sync Repos

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit repos.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix .github/scripts

      - name: Run repo sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_OWNER: razzyshmazzy
        run: node .github/scripts/sync-repos.js

      - name: Commit updated repos.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git diff --staged --quiet \
            && echo "No changes to repos.json — skipping commit." \
            || git commit -m "chore: sync repos [skip ci]"

      - name: Push changes
        run: git push
